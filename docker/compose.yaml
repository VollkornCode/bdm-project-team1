services:
  # Object Storage
  minio:
    image: minio/minio
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Web UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DOMAIN: minio
    command: server ../data --console-address ":9001"
    volumes:
      - minio_data:/data

  dataingester:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8888:8888"
    environment:
      # Hardcode the $JUPYTER_TOKEN
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-deltalake}
    volumes:
      - ../data:/data
      - ../notebooks:/home/jovyan/notebooks
      - ../src:/home/jovyan/src

volumes:
  minio_data:
